  test_sockets:
    "0":
      resource_strings:
        eth_to_i2c:    "172.21.101.40:2101"
        scanner:       "172.21.101.41:2000"
        led_ch9121:    "172.21.101.41:3000"
        psu_m3900:     "TCPIP0::172.21.101.46::inst0::INSTR"
