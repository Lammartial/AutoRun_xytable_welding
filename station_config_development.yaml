#------------------------------------------------------------------------------
#  This is the resource for our POOR MAN's SPS to control the welding sequences
#
CELL_WELDING:
  dsp_api_base_url:  "http://172.25.100.9:9929"  # Orbis DSP REST API for PRE-ASSEMBLY / COREPACK_TEST
  test_sockets:
    "0":
      resource_strings:
        # this is a MODBUS resource string
        aws3_controller:  "tcp:172.21.101.100:502"
        scanner:          "COM4,9600,8N1"  # Eth->UART


