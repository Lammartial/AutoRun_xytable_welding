%YAML 1.2
---
#
# DSP REST interface
#
# The DSP interface uses separate ports for each test type.
# So the production URL with port is to be found at the test type below.
# For evaluation or debugging puropses, the DSP interface can be set
# globally here. Just comment one of the lines in to use our mock-up DSP.
#
dsp_api_base_url:  "http://127.0.0.1:8000"      # mockup on localhost
#dsp_api_base_url:  "http://192.168.1.122:8000"  # mockup on TSDEV in DE
#dsp_api_base_url:  "http://172.25.100.43:8000"  # mockup on TSDEV in VN


#
#
# Configures the kind of test station as well as the
# hardware of PC and assigned measurement hardware
#

line_id:        1               # 1 .. 9, -1 = undetermined -> calculate from 2nd IP octet:
                                 #              xxx.xxx.LINE-ID-100.xxx if octet is > 100, otherwise := 0
#test_type:      UNDETERMINED     # cannot be set and comes from test program instead :
                                  #     CELLSTACK_TEST, PCBA_TEST, COREPACK_TEST, EOL_TEST
#station_id:     UNDETERMINED     # Define a Station name or comment out to take the PC's hostname instead:
                                 #     PL1-WS102=CELLSTACK_TEST
                                 #     PL1-WS103=PCBA_TEST
                                 #     PL1-WS111=CORPACK_TEST
                                 #     PL1-WS113=EOL_TEST
#line_network:   "172.21.101."    # Line specific network range is different depending on
                                 # where the PC is located:
                                 #  172.25.101.xxx in VN,
                                 #  172.21.101.xxx in DE
                                 # This pattern is uesed to identify the line network part to be
                                 # replaced by module station_config_loader.py when requested for
                                 # environment depending on the machine's network IP.
                                 # Example:
                                 #    machine has IP 175.25.101.113, then
                                 #    any IP address from the below definitions having 172.21.101.
                                 #    will be replaced by 175.25.101.
                                 #    "172.21.101.11:2101" -> "172.25.101.11:2101"
                                 #
                                 # comment out to leave all addresses unchanged
#
#------------------------------------------------------------------------------
# Configuration setup depending on the test_type selected
# for this station above:
#------------------------------------------------------------------------------
CELL_TEST:
  dsp_api_base_url:  "http://172.25.100.9:9925"  # Orbis DSP REST API @RRC (hostname MES-DSP-DE)
                                                 # Each line has own port range:
                                                 #  line 1 : 9925 - 9929
                                                 #  line 2 : 9935 - 9939
                                                 #  line 3 : 9945 - 9949
  # There is NO I2C MUX on cell stack tester.
  #
  # List of TestSocket configurations
  # Minimum is one (the first) socket.
  # Make sure the index is a string.
  test_sockets:
    "0":
      resource_strings:
        eth_to_i2c:   "172.21.101.20:2101"
        scanner:      "COM7,9600,8N1"
        icr_bt3561a:  "172.21.101.21:23"
        mux_sw1001:   "172.21.101.22:23"

#------------------------------------------------------------------------------
PCBA_TEST:
  dsp_api_base_url:  "http://172.25.100.9:9926"  # Orbis DSP REST API
  i2c_mux:
    # NCD 8x I2C-MUX:
    #  bus 1: Shunt calibration
    #  bus 2: smbus to battery (UUT)
    #  bus 3: GPIO Relayboard
    #  bus 4: Cell voltage simulation
    #  bus 5: spare i2c bus to UUT
    #  bus 6,7,8: unused
    num_bus: 8
    device_to_bus_map:
      # NOTE: This order may not be changed.
      #       Append new mappings on the end.
      #       (list is passed to TS as tuple without names)
      shunt_calibration: 1
      smbus_dut: 2
      gpio_relayboard: 3
      cell_voltage_simulation: 4
      spare_i2c_dut: 5
  test_sockets:
    "0":
      resource_strings:
        eth_to_i2c:  "172.21.101.30:2101"  #            RRC Lager
        scanner:     "172.21.101.31:2000"  # Eth->UART  RRC Lager
        led_ch9121:  "172.21.101.31:3000"  # Eth->UART  RRC Lager
        # Following are shared with ALL sockets
        daq_daq970a: "TCPIP0::172.21.101.36::inst0::INSTR"
        psu_e1206:   "TCPIP0::172.21.101.37::inst0::INSTR"
    "1":
      resource_strings: # already correct IP addresses
        eth_to_i2c:  "172.21.101.32:2101"
        scanner:     "172.21.101.33:2000"
        led_ch9121:  "172.21.101.33:3000"
        # Following are shared with ALL sockets
        daq_daq970a: "TCPIP0::172.21.101.36::inst0::INSTR"
        psu_e1206:   "TCPIP0::172.21.101.37::inst0::INSTR"  # bridge to m3400/3900 devices
    "2":
      resource_strings:
        eth_to_i2c:  "172.21.101.34:2101"
        scanner:     "172.21.101.35:2000"
        led_ch9121:  "172.21.101.35:3000"
        # Following are shared with ALL sockets
        daq_daq970a: "TCPIP0::172.21.101.36::inst0::INSTR"
        psu_e1206:   "TCPIP0::172.21.101.37::inst0::INSTR"  # bridge to m3400/3900 devices

#------------------------------------------------------------------------------
COREPACK_TEST:
  dsp_api_base_url:  "http://172.25.100.9:9927"  # Orbis DSP REST API
  i2c_mux:
    # NCD 8x I2C-MUX:
    #  bus 1: smbus to DUT
    #  bus 2: gpio board (pca9536)
    #  bus 3: reference temperature (sts21)
    #  bus 4,5,6,7,8: unused
    num_bus: 8
    device_to_bus_map:
      # NOTE: This order may not be changed.
      #       Append new mappings on the end.
      #       (list is passed to TS as tuple without names)
      smbus_dut: 1
      gpio_board: 2
      temp_meas: 3
  test_sockets:
    "0":
      resource_strings:
        eth_to_i2c:    "172.21.101.40:2101"
        scanner:       "172.21.101.41:2000"
        led_ch9121:    "172.21.101.41:3000"
        psu_m3900:     "TCPIP0::172.21.101.46::inst0::INSTR"
        icr_bt3561a:   "172.21.101.44:23"
    "1":
      resource_strings:
        eth_to_i2c:    "172.21.101.42:2101"
        scanner:       "172.21.101.43:2000"
        led_ch9121:    "172.21.101.43:3000"
        psu_m3900:     "TCPIP0::172.21.101.47::inst0::INSTR"
        icr_bt3561a:   "172.21.101.45:23"


